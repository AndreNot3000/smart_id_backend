# Closest Fly region to Nigeria is jnb (Johannesburg). London (lhr) or Paris
# (cdg) are also fine if you prefer European routing.
app = "campus-id-backend"
primary_region = "jnb"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  # Keep one machine always running: this app has background jobs and in-memory
  # state for real-time polling, so it must NOT scale to zero.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
