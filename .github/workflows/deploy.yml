name: Deploy to Staging

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚀 Deploy to Staging Environment
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 64.111.93.87
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/smart_id_backend_staging
          echo "📥 Pulling latest code from GitHub..."
          git pull origin main
          echo "📦 Installing dependencies..."
          bun install
          echo "🔄 Restarting staging backend with PM2..."
          pm2 restart campus-id-backend-staging
          echo "✅ Staging deployment completed!"
          echo "🌐 Staging URL: https://staging-api.smartunivid.xyz"
          echo "📊 Backend status:"
          pm2 status
          echo "📝 Recent logs:"
          pm2 logs campus-id-backend-staging --lines 10 --nostream
